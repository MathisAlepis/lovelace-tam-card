name: Prepare draft release bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag and draft release to receive tam-card.js (for example v4.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  attach-bundle:
    name: Build and attach tam-card.js to a draft
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Yarn 4.12 through Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')"
          test "$VERSION" = "$PACKAGE_VERSION"

      - name: Require an existing draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          DRAFT="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.draft')"
          test "$DRAFT" = "true"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production bundle
        run: yarn build

      - name: Verify release bundle
        run: test -s dist/tam-card.js

      - name: Attach bundle without publishing the draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" "dist/tam-card.js#tam-card.js" --clobber
