name: Refresh route catalogue

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: route-catalog-refresh
  cancel-in-progress: false

jobs:
  refresh-route-catalog:
    name: Refresh official GTFS route styles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate the browser catalogue from official GTFS feeds
        run: node scripts/update-route-styles.mjs --format json --output route-styles.json

      - name: Commit a real catalogue change
        run: |
          if git diff --quiet -- route-styles.json; then
            echo "Route styles are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add route-styles.json
          git commit -m "chore(data): refresh route styles"
          git push origin HEAD:main
