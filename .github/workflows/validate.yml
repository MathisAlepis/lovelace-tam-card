name: HACS validation

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    name: Validate Dashboard plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
